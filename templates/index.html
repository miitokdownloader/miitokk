<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiiTok — TikTok Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── VARIABLES ───────────────────────────────────── */
    :root {
      --red:        #cc0000;
      --red-deep:   #880000;
      --red-glow:   rgba(204,0,0,0.45);
      --red-soft:   rgba(204,0,0,0.18);
      --white:      #f5ede0;
      --white-dim:  rgba(245,237,224,0.7);
      --black:      #0a0806;
      --glass:      rgba(8,4,4,0.55);
      --glass-border: rgba(204,0,0,0.3);
      --overlay:    rgba(5,2,2,0.30);
      --font-logo:  'Cinzel', serif;
      --font-sub:   'Cormorant Garamond', serif;
      --font-ui:    'Rajdhani', sans-serif;
    }

    /* ── RESET ───────────────────────────────────────── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }

    body {
      font-family: var(--font-ui);
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND VIDEO ────────────────────────────── */
    .bg-video {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%; min-height: 100%;
      width: auto; height: auto;
      z-index: 0;
      object-fit: cover;
      filter: brightness(0.72) saturate(1.3);
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      z-index: 1;
    }

    /* ── PAGE WRAPPER ────────────────────────────────── */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 64px;
    }

    /* ── HEADER ──────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo {
      font-family: var(--font-logo);
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.18em;
      color: var(--white);
      text-shadow:
        0 0 12px var(--red-glow),
        0 0 40px rgba(204,0,0,0.25),
        0 2px 4px rgba(0,0,0,0.8);
      line-height: 1;
    }

    .subtitle {
      font-family: var(--font-sub);
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      letter-spacing: 0.3em;
      color: rgba(204,0,0,0.85);
      margin-top: 8px;
      text-transform: uppercase;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      margin: 14px auto 0;
    }

    /* ── MAIN CARD ───────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 640px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 28px 24px 32px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 0 40px rgba(0,0,0,0.6),
        0 0 0 1px rgba(204,0,0,0.08) inset;
    }

    /* ── QUALITY SELECTOR ────────────────────────────── */
    .quality-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .q-btn {
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      padding: 7px 18px;
      border-radius: 6px;
      border: 1px solid rgba(204,0,0,0.35);
      background: transparent;
      color: rgba(245,237,224,0.5);
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }

    .q-btn:hover {
      border-color: var(--red);
      color: var(--white);
    }

    .q-btn.active {
      background: rgba(204,0,0,0.15);
      border-color: var(--red);
      color: var(--white);
      box-shadow: 0 0 14px var(--red-glow), inset 0 0 8px rgba(204,0,0,0.1);
      text-shadow: 0 0 8px var(--red-glow);
    }

    .q-btn .music-icon { font-size: 0.7rem; margin-right: 4px; opacity: 0.9; }

    /* ── INPUT ───────────────────────────────────────── */
    .input-wrap {
      position: relative;
      margin-bottom: 6px;
    }

    .url-input {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(204,0,0,0.3);
      border-radius: 10px;
      padding: 14px 48px 14px 18px;
      color: var(--white);
      font-family: var(--font-ui);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      caret-color: var(--red);
    }

    .url-input::placeholder { color: rgba(245,237,224,0.25); }

    .url-input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(204,0,0,0.12);
    }

    .clear-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(245,237,224,0.3);
      font-size: 1.1rem;
      cursor: pointer;
      display: none;
      line-height: 1;
      padding: 4px;
    }

    .clear-btn.visible { display: block; }

    /* ── PREVIEW CARD ────────────────────────────────── */
    .preview-card {
      display: none;
      margin: 14px 0 0;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(204,0,0,0.2);
      border-radius: 10px;
      overflow: hidden;
      animation: fadeSlideIn 0.3s ease;
    }

    .preview-card.show { display: flex; align-items: stretch; }

    .preview-thumb {
      width: 100px;
      min-width: 100px;
      object-fit: cover;
      display: block;
    }

    .preview-info {
      padding: 12px 14px;
      flex: 1;
      min-width: 0;
    }

    .preview-title {
      font-family: var(--font-ui);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .preview-meta {
      font-size: 0.75rem;
      color: rgba(245,237,224,0.45);
      letter-spacing: 0.05em;
    }

    .preview-meta span { margin-right: 10px; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── DOWNLOAD BUTTON ─────────────────────────────── */
    .dl-wrap {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      position: relative;
    }

    /* Animated ring */
    .ring-svg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% + 28px);
      max-width: 380px;
      height: calc(100% + 28px);
      pointer-events: none;
      opacity: 0.55;
    }

    .ring-svg circle {
      fill: none;
      stroke: var(--red);
      stroke-width: 1;
      stroke-dasharray: 6 14;
      animation: ringRotate 8s linear infinite;
      transform-origin: center;
    }

    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .dl-btn {
      position: relative;
      z-index: 1;
      font-family: var(--font-logo);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.25em;
      color: var(--white);
      background: linear-gradient(135deg, rgba(180,0,0,0.9) 0%, rgba(100,0,0,0.95) 100%);
      border: 1px solid rgba(204,0,0,0.7);
      border-radius: 10px;
      padding: 16px 0;
      width: 100%;
      max-width: 320px;
      cursor: pointer;
      text-align: center;
      transition: all 0.25s;
      box-shadow:
        0 0 20px rgba(204,0,0,0.35),
        0 4px 16px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: btnBreath 3s ease-in-out infinite;
    }

    @keyframes btnBreath {
      0%, 100% { box-shadow: 0 0 20px rgba(204,0,0,0.35), 0 4px 16px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06); }
      50%       { box-shadow: 0 0 30px rgba(204,0,0,0.55), 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06); }
    }

    .dl-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 36px rgba(204,0,0,0.6), 0 8px 24px rgba(0,0,0,0.6);
      animation: none;
    }

    .dl-btn:active { transform: translateY(0); }

    .dl-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      animation: none;
    }

    /* ── SPINNER ─────────────────────────────────────── */
    .spinner-wrap {
      display: none;
      text-align: center;
      padding: 20px 0 4px;
    }

    .spinner-wrap.show { display: block; }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(204,0,0,0.15);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner-label {
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      color: rgba(204,0,0,0.7);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* ── STATUS ──────────────────────────────────────── */
    .status {
      margin-top: 14px;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      min-height: 20px;
      text-align: center;
      word-break: break-word;
      overflow-wrap: break-word;
      max-width: 100%;
      line-height: 1.5;
    }

    .status.ok  { color: #55cc88; }
    .status.err { color: #ff4444; }

    /* ── FOOTER ──────────────────────────────────────── */
    .footer {
      margin-top: 40px;
      font-family: var(--font-sub);
      font-style: italic;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: rgba(204,0,0,0.35);
      text-align: center;
    }

    /* ────────────────────────────────────────────────── */
    /*  MODAL                                             */
    /* ────────────────────────────────────────────────── */

    /* Backdrop */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .modal-backdrop.show { display: flex; align-items: flex-end; justify-content: center; }

    @media (min-width: 640px) {
      .modal-backdrop.show { align-items: center; }
    }

    /* Modal box */
    .modal {
      background: rgba(12,4,4,0.97);
      border: 1px solid rgba(204,0,0,0.4);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 28px 24px 32px;
      position: relative;
      animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1);
      box-shadow: 0 -8px 48px rgba(204,0,0,0.2), 0 0 0 1px rgba(204,0,0,0.12);
    }

    @media (min-width: 640px) {
      .modal {
        border: 1px solid rgba(204,0,0,0.4);
        border-radius: 16px;
        animation: fadeScale 0.25s ease;
      }
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeScale {
      from { transform: scale(0.95); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* Drag handle (mobile) */
    .modal-handle {
      width: 40px; height: 4px;
      background: rgba(204,0,0,0.3);
      border-radius: 2px;
      margin: 0 auto 22px;
    }

    @media (min-width: 640px) { .modal-handle { display: none; } }

    .modal-title {
      font-family: var(--font-logo);
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      color: rgba(204,0,0,0.8);
      text-align: center;
      margin-bottom: 20px;
    }

    /* Thumbnail row */
    .modal-thumb-row {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 20px;
      min-height: 0;
    }

    .modal-thumb {
      width: 80px; height: 80px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid rgba(204,0,0,0.25);
      flex-shrink: 0;
      display: none;
    }

    .modal-thumb.show { display: block; }

    .modal-video-info { flex: 1; min-width: 0; }

    .modal-video-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .modal-video-uploader {
      font-size: 0.75rem;
      color: rgba(245,237,224,0.4);
    }

    /* Info pills */
    .modal-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .pill {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid rgba(204,0,0,0.3);
      color: rgba(245,237,224,0.65);
      background: rgba(204,0,0,0.06);
    }

    .pill.highlight {
      border-color: var(--red);
      color: var(--white);
      background: rgba(204,0,0,0.15);
    }

    /* Modal buttons */
    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .modal-dl-btn {
      font-family: var(--font-logo);
      font-weight: 600;
      font-size: 0.92rem;
      letter-spacing: 0.2em;
      color: var(--white);
      background: linear-gradient(135deg, rgba(180,0,0,0.9), rgba(100,0,0,0.95));
      border: 1px solid rgba(204,0,0,0.6);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      box-shadow: 0 0 18px rgba(204,0,0,0.3);
    }

    .modal-dl-btn:hover { box-shadow: 0 0 28px rgba(204,0,0,0.55); transform: translateY(-1px); }

    .modal-secondary-row {
      display: flex;
      gap: 10px;
    }

    .modal-sec-btn {
      flex: 1;
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      padding: 11px;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      background: transparent;
    }

    .modal-sec-btn.cancel {
      border: 1px solid rgba(245,237,224,0.12);
      color: rgba(245,237,224,0.4);
    }

    .modal-sec-btn.cancel:hover { border-color: rgba(245,237,224,0.3); color: rgba(245,237,224,0.7); }

    .modal-sec-btn.copy {
      border: 1px solid rgba(204,0,0,0.3);
      color: rgba(204,0,0,0.7);
    }

    .modal-sec-btn.copy:hover { border-color: var(--red); color: var(--red); }

    /* ── PHOTO CAROUSEL ─────────────────────────────── */
    .photo-carousel {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 12px;
      padding: 4px 0 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(204,0,0,0.4) transparent;
      -webkit-overflow-scrolling: touch;
    }

    .photo-carousel::-webkit-scrollbar {
      height: 4px;
    }

    .photo-carousel::-webkit-scrollbar-track {
      background: transparent;
    }

    .photo-carousel::-webkit-scrollbar-thumb {
      background: rgba(204,0,0,0.4);
      border-radius: 2px;
    }

    .photo-card {
      flex: 0 0 80%;
      scroll-snap-align: center;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(204,0,0,0.25);
    }

    .photo-card img {
      width: 100%;
      display: block;
      border-radius: 10px 10px 0 0;
      max-height: 420px;
      object-fit: cover;
    }

    .photo-card-footer {
      padding: 8px;
      text-align: center;
      background: rgba(0,0,0,0.55);
    }

    .photo-dl-btn {
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      padding: 6px 14px;
      border-radius: 6px;
      background: rgba(180,0,0,0.85);
      border: 1px solid rgba(204,0,0,0.6);
      color: var(--white);
      cursor: pointer;
      transition: all 0.2s;
    }

    .photo-dl-btn:hover {
      background: rgba(204,0,0,0.95);
      box-shadow: 0 0 12px rgba(204,0,0,0.5);
    }

    .photo-count {
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      color: rgba(204,0,0,0.8);
      margin-bottom: 12px;
      text-align: center;
    }

    .arrow-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(204,0,0,0.45);
      color: var(--white);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 1rem;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
      transition: all 0.2s;
    }

    .arrow-btn:hover {
      background: rgba(180,0,0,0.7);
      border-color: var(--red);
    }

    #arrowLeft  { left: -14px; }
    #arrowRight { right: -14px; }

    .download-all-btn {
      font-family: var(--font-logo);
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      padding: 10px 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(180,0,0,0.9), rgba(100,0,0,0.95));
      border: 1px solid rgba(204,0,0,0.6);
      color: var(--white);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 16px rgba(204,0,0,0.3);
    }

    .download-all-btn:hover {
      box-shadow: 0 0 28px rgba(204,0,0,0.55);
      transform: translateY(-1px);
    }

    @media (min-width: 640px) {
      .photo-card { flex: 0 0 260px; }
      .arrow-btn  { display: flex; }
    }

    /* ── DESKTOP TWEAKS ──────────────────────────────── */
    @media (min-width: 768px) {
      .page { padding: 64px 40px 80px; }
      .card { padding: 36px 36px 40px; }
      .logo { letter-spacing: 0.22em; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="/static/makima.mp4" type="video/mp4" />
  </video>
  <div class="bg-overlay"></div>

  <!-- Page -->
  <div class="page">

    <!-- Header -->
    <header class="header">
      <div class="logo">MIITOK</div>
      <div class="subtitle">TikTok Downloader &mdash; No Watermark</div>
      <div class="divider"></div>
    </header>

    <!-- Card -->
    <div class="card">

      <!-- Quality -->
      <div class="quality-row">
        <button class="q-btn active" onclick="setQuality(this,'best')">BEST</button>
        <button class="q-btn" onclick="setQuality(this,'1080')">1080P</button>
        <button class="q-btn" onclick="setQuality(this,'720')">720P</button>
        <button class="q-btn" onclick="setQuality(this,'photo')">PHOTO</button>
      </div>

      <!-- Input -->
      <div class="input-wrap">
        <input
          id="urlInput"
          class="url-input"
          type="text"
          placeholder="Paste link TikTok di sini..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          oninput="onUrlInput()"
        />
        <button class="clear-btn" id="clearBtn" onclick="clearUrl()" title="Hapus">✕</button>
      </div>

      <!-- Preview card -->
      <div class="preview-card" id="previewCard">
        <img class="preview-thumb" id="previewThumb" src="" alt="" />
        <div class="preview-info">
          <div class="preview-title" id="previewTitle"></div>
          <div class="preview-meta">
            <span id="previewUploader"></span>
            <span id="previewDuration"></span>
          </div>
        </div>
      </div>

      <!-- Download button -->
      <div class="dl-wrap" id="dlWrap">
        <svg class="ring-svg" viewBox="0 0 320 60" preserveAspectRatio="none" aria-hidden="true">
          <rect x="2" y="2" width="316" height="56" rx="10" ry="10"
                fill="none" stroke="#cc0000" stroke-width="1"
                stroke-dasharray="8 16"
                style="animation: ringRotate 10s linear infinite; transform-origin: center;" />
        </svg>
        <button class="dl-btn" id="dlBtn" onclick="openModal()">DOWNLOAD</button>
      </div>

      <!-- Spinner -->
      <div class="spinner-wrap" id="spinnerWrap">
        <div class="spinner"></div>
        <div class="spinner-label">MEMPROSES&hellip;</div>
      </div>

      <!-- Status -->
      <div class="status" id="status"></div>

      <!-- Photo carousel section -->
      <div id="photoSection" style="display:none; margin-top:16px;">
        <div class="photo-count" id="photoCount"></div>
        <div style="position:relative; padding: 0 2px;">
          <button class="arrow-btn" id="arrowLeft" onclick="carouselScroll(-1)">&#8592;</button>
          <button class="arrow-btn" id="arrowRight" onclick="carouselScroll(1)">&#8594;</button>
          <div class="photo-carousel" id="photoCarousel"></div>
        </div>
        <div style="text-align:center; margin-top:14px;">
          <button class="download-all-btn" id="downloadAllBtn" onclick="downloadAllPhotos()" style="display:none;">DOWNLOAD ALL</button>
        </div>
      </div>

    </div><!-- /card -->

    <div class="footer">MIITOK &copy; 2025 &mdash; Free &amp; No Watermark</div>
  </div>

  <!-- ── MODAL ─────────────────────────────────────── -->
  <div class="modal-backdrop" id="modalBackdrop" onclick="backdropClick(event)">
    <div class="modal" id="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">KONFIRMASI DOWNLOAD</div>

      <div class="modal-thumb-row">
        <img class="modal-thumb" id="modalThumb" src="" alt="" />
        <div class="modal-video-info">
          <div class="modal-video-title" id="modalTitle">TikTok Video</div>
          <div class="modal-video-uploader" id="modalUploader"></div>
        </div>
      </div>

      <div class="modal-pills" id="modalPills"></div>

      <div class="modal-actions">
        <button class="modal-dl-btn" onclick="confirmDownload()">DOWNLOAD NOW</button>
        <div class="modal-secondary-row">
          <button class="modal-sec-btn cancel" onclick="closeModal()">CANCEL</button>
          <button class="modal-sec-btn copy" onclick="copyLink()">COPY LINK</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ── STATE ────────────────────────────────────── */
    let selectedQuality = 'best';
    let isDownloading   = false;
    let previewData     = null;
    let previewTimer    = null;
    let photoUrls       = [];
    let isPhotoMode     = false;

    const qualityLabel = { best:'BEST', '1080':'1080P', '720':'720P', photo:'PHOTO' };
    const typeLabel    = { best:'MP4', '1080':'MP4', '720':'MP4', photo:'IMAGE' };

    /* ── QUALITY ──────────────────────────────────── */
    function setQuality(el, q) {
      isDownloading = false;
      document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      selectedQuality = q;
      if (q === 'photo') {
        isPhotoMode = true;
        document.getElementById('dlWrap').style.display = 'none';
        const val = document.getElementById('urlInput').value.trim();
        if (val.length > 10 && (val.includes('tiktok.com') || val.includes('vt.tiktok'))) {
          clearTimeout(previewTimer);
          previewTimer = setTimeout(() => fetchPhotos(val), 300);
        }
      } else {
        isPhotoMode = false;
        document.getElementById('dlWrap').style.display = '';
        document.getElementById('photoSection').style.display = 'none';
        document.getElementById('photoCarousel').innerHTML = '';
        document.getElementById('photoCount').textContent = '';
        document.getElementById('downloadAllBtn').style.display = 'none';
        photoUrls = [];
      }
    }

    /* ── INPUT ────────────────────────────────────── */
    function onUrlInput() {
      const val = document.getElementById('urlInput').value.trim();
      const clearBtn = document.getElementById('clearBtn');
      clearBtn.classList.toggle('visible', val.length > 0);

      clearTimeout(previewTimer);
      hidePreview();
      setStatus('', '');

      if (val.length > 10 && (val.includes('tiktok.com') || val.includes('vt.tiktok'))) {
        if (isPhotoMode) {
          previewTimer = setTimeout(() => fetchPhotos(val), 900);
        } else {
          previewTimer = setTimeout(() => fetchPreview(val), 900);
        }
      }
    }

    function clearUrl() {
      document.getElementById('urlInput').value = '';
      document.getElementById('clearBtn').classList.remove('visible');
      clearTimeout(previewTimer);
      hidePreview();
      setStatus('', '');
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status' + (type ? ' ' + type : '');
    }

    function hidePreview() {
      previewData = null;
      document.getElementById('previewCard').classList.remove('show');
    }

    async function fetchPreview(url) {
      try {
        const fd = new FormData();
        fd.append('url', url);
        const res = await fetch('/preview', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.error || !data.title) return;
        previewData = data;
        document.getElementById('previewTitle').textContent = data.title || '';
        document.getElementById('previewUploader').textContent = data.uploader ? '@' + data.uploader : '';
        if (data.duration) {
          const m = Math.floor(data.duration / 60);
          const s = data.duration % 60;
          document.getElementById('previewDuration').textContent = m + ':' + String(s).padStart(2,'0');
        }
        if (data.thumbnail) {
          document.getElementById('previewThumb').src = data.thumbnail;
        }
        document.getElementById('previewCard').classList.add('show');
      } catch(e) {}
    }

    function openModal() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) {
        setStatus('Paste TikTok link first.', 'err');
        return;
      }
      // Populate modal info
      if (previewData) {
        document.getElementById('modalTitle').textContent = previewData.title || 'TikTok Video';
        document.getElementById('modalUploader').textContent = previewData.uploader ? '@' + previewData.uploader : '';
        const thumb = document.getElementById('modalThumb');
        if (previewData.thumbnail) {
          thumb.src = previewData.thumbnail;
          thumb.classList.add('show');
        } else {
          thumb.classList.remove('show');
        }
      } else {
        document.getElementById('modalTitle').textContent = 'TikTok Video';
        document.getElementById('modalUploader').textContent = '';
        document.getElementById('modalThumb').classList.remove('show');
      }
      // Pills
      const pills = document.getElementById('modalPills');
      pills.innerHTML = '';
      const qPill = document.createElement('span');
      qPill.className = 'pill highlight';
      qPill.textContent = qualityLabel[selectedQuality] || selectedQuality;
      pills.appendChild(qPill);
      const tPill = document.createElement('span');
      tPill.className = 'pill';
      tPill.textContent = typeLabel[selectedQuality] || 'MP4';
      pills.appendChild(tPill);

      document.getElementById('modalBackdrop').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modalBackdrop').classList.remove('show');
    }

    function backdropClick(event) {
      if (event.target === document.getElementById('modalBackdrop')) {
        closeModal();
      }
    }

    function copyLink() {
      const url = document.getElementById('urlInput').value.trim();
      if (url) {
        navigator.clipboard.writeText(url).catch(() => {});
      }
      closeModal();
    }

    async function confirmDownload() {
      if (isDownloading) return;
      const url = document.getElementById('urlInput').value.trim();
      if (!url) {
        setStatus('Paste TikTok link first.', 'err');
        closeModal();
        return;
      }
      closeModal();
      isDownloading = true;
      const btn = document.getElementById('dlBtn');
      btn.disabled = true;
      document.getElementById('spinnerWrap').classList.add('show');
      setStatus('', '');

      try {
        const formData = new FormData();
        formData.append('url', url);
        formData.append('quality', selectedQuality);

        const response = await fetch('/download', {
          method: 'POST',
          body: formData
        });

        if (!response.ok) {
          let errMsg = 'Download gagal.';
          try {
            const errData = await response.json();
            if (errData.error) errMsg = errData.error;
          } catch(e) {}
          setStatus(errMsg, 'err');
          return;
        }

        // Trigger file download
        const blob = await response.blob();
        const contentDisposition = response.headers.get('Content-Disposition') || '';
        let filename = 'miitok_video.mp4';
        const match = contentDisposition.match(/filename="?([^";\n]+)"?/);
        if (match) filename = match[1];
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
          document.body.removeChild(a);
          URL.revokeObjectURL(blobUrl);
        }, 1000);
        setStatus('Download berhasil!', 'ok');

      } catch(e) {
        setStatus('Terjadi kesalahan, coba lagi.', 'err');
      } finally {
        isDownloading = false;
        btn.disabled = false;
        document.getElementById('spinnerWrap').classList.remove('show');
      }
    }
    /* ── PHOTO MODE ───────────────────────────────── */
    async function fetchPhotos(url) {
      if (isDownloading) return;
      isDownloading = true;
      document.getElementById('spinnerWrap').classList.add('show');
      document.getElementById('photoSection').style.display = 'none';
      setStatus('', '');
      try {
        const fd = new FormData();
        fd.append('url', url);
        const res = await fetch('/photos', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.error) {
          setStatus(data.error, 'err');
          return;
        }
        renderCarousel(data.photos || [], data.count || 0);
      } catch(e) {
        setStatus('Terjadi kesalahan saat mengambil foto.', 'err');
      } finally {
        isDownloading = false;
        document.getElementById('spinnerWrap').classList.remove('show');
      }
    }

    function renderCarousel(photos, count) {
      if (!isPhotoMode) return;
      const carousel  = document.getElementById('photoCarousel');
      const countEl   = document.getElementById('photoCount');
      const dlAllBtn  = document.getElementById('downloadAllBtn');
      const section   = document.getElementById('photoSection');
      carousel.innerHTML = '';
      if (!photos || !photos.length) {
        countEl.textContent  = 'No photos found. This link may be a video.';
        countEl.style.color  = 'rgba(204,0,0,0.5)';
        dlAllBtn.style.display = 'none';
        section.style.display = 'block';
        return;
      }
      photoUrls = photos;
      countEl.textContent = 'Photos found: ' + count;
      countEl.style.color = 'rgba(204,0,0,0.8)';
      photos.forEach(function(url, i) {
        const card = document.createElement('div');
        card.className = 'photo-card';
        const img = document.createElement('img');
        img.src     = '/photo-proxy?url=' + encodeURIComponent(url);
        img.alt     = 'Photo ' + (i + 1);
        img.loading = 'lazy';
        const footer = document.createElement('div');
        footer.className = 'photo-card-footer';
        const btn = document.createElement('button');
        btn.className   = 'photo-dl-btn';
        btn.textContent = 'DOWNLOAD PHOTO';
        btn.onclick     = (function(u, idx) { return function() { downloadPhoto(u, idx); }; })(url, i + 1);
        footer.appendChild(btn);
        card.appendChild(img);
        card.appendChild(footer);
        carousel.appendChild(card);
      });
      dlAllBtn.style.display = 'inline-block';
      section.style.display  = 'block';
    }

    async function downloadPhoto(url, index) {
      try {
        const filename = 'miitok_photo_' + index + '.jpg';
        const res = await fetch('/download-photo?url=' + encodeURIComponent(url) + '&filename=' + encodeURIComponent(filename));
        if (!res.ok) { setStatus('Gagal mengunduh foto ' + index, 'err'); return; }
        const blob    = await res.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a       = document.createElement('a');
        a.href        = blobUrl;
        a.download    = filename;
        document.body.appendChild(a);
        a.click();
        setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(blobUrl); }, 1000);
      } catch(e) {
        setStatus('Gagal mengunduh foto ' + index, 'err');
      }
    }

    async function downloadAllPhotos() {
      if (!photoUrls.length) return;
      setStatus('Mengunduh ' + photoUrls.length + ' foto...', 'ok');
      for (let i = 0; i < photoUrls.length; i++) {
        await downloadPhoto(photoUrls[i], i + 1);
        if (i < photoUrls.length - 1) {
          await new Promise(function(resolve) { setTimeout(resolve, 350); });
        }
      }
      setStatus('Semua foto berhasil diunduh!', 'ok');
    }

    function carouselScroll(direction) {
      const carousel = document.getElementById('photoCarousel');
      const card     = carousel.querySelector('.photo-card');
      const cardWidth = card ? (card.offsetWidth + 12) : 280;
      carousel.scrollBy({ left: direction * cardWidth, behavior: 'smooth' });
    }
  </script>
</body>
</html>
