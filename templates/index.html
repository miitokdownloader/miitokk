<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiiTok Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
        }

        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            filter: brightness(0.25) saturate(1.5);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.7) 0%,
                rgba(80,0,0,0.3) 50%,
                rgba(0,0,0,0.9) 100%
            );
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px 24px;
            max-width: 560px;
            width: 100%;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 8px;
            text-shadow: 
                0 0 10px #cc0000,
                0 0 30px #cc0000,
                0 0 60px #cc0000;
            margin-bottom: 6px;
        }

        .tagline {
            color: #cc0000;
            font-size: 0.8rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            font-family: 'Rajdhani', sans-serif;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(to right, transparent, #cc0000, transparent);
            margin: 0 auto 32px;
        }

        .quality-select {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quality-btn {
            background: transparent;
            border: 1px solid #cc000088;
            color: #aaa;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .quality-btn.active {
            background: #cc0000;
            border-color: #cc0000;
            color: #fff;
            box-shadow: 0 0 10px #cc000066;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 14px;
        }

        .input-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid #cc000066;
            border-radius: 8px;
            padding: 16px 20px;
            width: 100%;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Rajdhani', sans-serif;
            outline: none;
            transition: border 0.3s;
            backdrop-filter: blur(10px);
        }

        .input-box:focus {
            border-color: #cc0000;
            box-shadow: 0 0 15px #cc000033;
        }

        .input-box::placeholder { color: #555; }

        .btn {
            background: linear-gradient(135deg, #cc0000, #880000);
            color: #fff;
            border: none;
            padding: 16px 40px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            width: 100%;
            letter-spacing: 3px;
            transition: all 0.3s;
            box-shadow: 0 4px 20px #cc000044;
        }

        .btn:hover {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            box-shadow: 0 4px 30px #cc000088;
            transform: translateY(-1px);
        }

        .btn:disabled {
            background: #333;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            margin: 24px auto;
        }

        .loading.show { display: block; }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid #222;
            border-top: 3px solid #cc0000;
            border-right: 3px solid #cc000066;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: #cc0000;
            font-size: 0.8rem;
            letter-spacing: 3px;
            font-family: 'Rajdhani', sans-serif;
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .status {
            margin-top: 16px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            min-height: 22px;
            font-family: 'Rajdhani', sans-serif;
        }

        .status.success { color: #00cc66; }
        .status.error { color: #cc0000; }

        .footer {
            margin-top: 36px;
            color: #333;
            font-size: 0.75rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <img class="bg" src="/82d305b158d544ab82bec6e6f5fc7f63.gif" alt="bg"/>
    <div class="overlay"></div>

    <div class="container">
        <div class="logo">MIITOK</div>
        <div class="tagline">TIKTOK DOWNLOADER — NO WATERMARK</div>
        <div class="divider"></div>

        <div class="quality-select">
            <button class="quality-btn active" onclick="setQuality(this,'best')">BEST</button>
            <button class="quality-btn" onclick="setQuality(this,'1080p')">1080P</button>
            <button class="quality-btn" onclick="setQuality(this,'720p')">720P</button>
            <button class="quality-btn" onclick="setQuality(this,'480p')">480P</button>
            <button class="quality-btn" onclick="setQuality(this,'audio')">AUDIO</button>
        </div>

        <div class="input-wrap">
            <input class="input-box" id="urlInput"
                   placeholder="Paste link TikTok di sini..."
                   type="text"/>
        </div>

        <button class="btn" id="dlBtn" onclick="downloadVideo()">DOWNLOAD</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text">MEMPROSES VIDEO...</div>
        </div>

        <div class="status" id="status"></div>
        <div class="footer">MIITOK © 2025 — FREE & NO WATERMARK</div>
    </div>

    <script>
        let selectedQuality = 'best';

        function setQuality(el, q) {
            document.querySelectorAll('.quality-btn')
                .forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            selectedQuality = q;
        }

        async function downloadVideo() {
            const url = document.getElementById('urlInput').value.trim();
            const status = document.getElementById('status');
            const loading = document.getElementById('loading');
            const btn = document.getElementById('dlBtn');

            if (!url) {
                status.className = 'status error';
                status.textContent = '⚠ MASUKKAN LINK TIKTOK DULU';
                return;
            }

            btn.disabled = true;
            loading.classList.add('show');
            status.className = 'status';
            status.textContent = '';

            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url, quality: selectedQuality})
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = selectedQuality === 'audio'
                        ? 'miitok_audio.mp3'
                        : 'miitok_video.mp4';
                    a.click();
                    status.className = 'status success';
                    status.textContent = '✓ DOWNLOAD BERHASIL!';
                } else {
                    const err = await response.json();
                    status.className = 'status error';
                    status.textContent = '✗ GAGAL: ' + err.error;
                }
            } catch(e) {
                status.className = 'status error';
                status.textContent = '✗ ERROR: ' + e.message;
            } finally {
                btn.disabled = false;
                loading.classList.remove('show');
            }
        }
    </script>
</body>
</html>
