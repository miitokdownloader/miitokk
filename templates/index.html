<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiiTok Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            background: #0a0a0a;
        }

        /* ===== BACKGROUND VIDEO ===== */
        .bg-video {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: 0;
            filter: brightness(0.4) saturate(2);
        }

        /* ===== OVERLAY ===== */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.35);
            z-index: 1;
        }

        /* ===== PAGE WRAPPER ===== */
        .page-wrapper {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 16px 48px;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.2rem, 6vw, 4rem);
            font-weight: 900;
            color: #fff;
            letter-spacing: 8px;
            text-shadow: 0 0 10px #cc0000, 0 0 30px #cc0000, 0 0 60px #cc0000;
        }

        .tagline {
            color: #cc0000;
            font-size: 0.78rem;
            letter-spacing: 4px;
            margin-top: 6px;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(to right, transparent, #cc0000, transparent);
            margin: 12px auto 0;
        }

        /* ===== MAIN PANEL ===== */
        .main-panel {
            width: 100%;
            max-width: 700px;
        }

        /* ===== QUALITY TABS ===== */
        .quality-select {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .quality-btn {
            background: transparent;
            border: 1px solid #cc000055;
            color: #888;
            padding: 7px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 0.82rem;
            letter-spacing: 2px;
            transition: all 0.2s;
        }

        .quality-btn.active {
            background: #cc0000;
            border-color: #cc0000;
            color: #fff;
            box-shadow: 0 0 12px #cc000088;
        }

        .quality-btn:not(.active):hover {
            border-color: #cc0000aa;
            color: #ccc;
        }

        /* ===== INPUT ===== */
        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: stretch;
            width: 100%;
        }

        .input-box {
            flex: 1;
            width: 100%;
            box-sizing: border-box;
            background: rgba(255,255,255,0.05);
            border: 1px solid #cc000055;
            border-radius: 8px;
            padding: 14px 18px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: border 0.3s;
        }

        .input-box:focus {
            border-color: #cc0000;
            box-shadow: 0 0 15px #cc000033;
        }

        .input-box::placeholder { color: #444; }

        /* ===== LOADING SPINNER ===== */
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loading.show { display: block; }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid #222;
            border-top: 3px solid #cc0000;
            border-right: 3px solid #cc000066;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: #cc0000;
            font-size: 0.78rem;
            letter-spacing: 3px;
            animation: pulse-text 1.2s ease-in-out infinite;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        /* ===== PHOTO GRID ===== */
        .photo-grid {
            display: none;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .photo-grid.show { display: grid; }

        .photo-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #cc000044;
        }

        .photo-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .photo-dl-btn {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(204,0,0,0.85);
            color: #fff;
            border: none;
            padding: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .dl-all-btn {
            display: none;
            margin-top: 12px;
            background: transparent;
            border: 1px solid #cc0000;
            color: #cc0000;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .dl-all-btn.show { display: block; }

        /* ===== STATUS ===== */
        .status {
            margin-top: 16px;
            font-size: 0.88rem;
            letter-spacing: 1px;
            min-height: 22px;
            text-align: center;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .status.success { color: #00cc66; }
        .status.error   { color: #ff3333; }

        .footer {
            margin-top: 40px;
            color: #333;
            font-size: 0.72rem;
            letter-spacing: 2px;
            text-align: center;
        }

        /* ===== MAIN DOWNLOAD BUTTON ===== */
        .dl-btn-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }

        .dl-main-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 280px;
            height: 72px;
            border: 1px solid #cc0000;
            border-radius: 10px;
            background: linear-gradient(135deg, #1a0000 0%, #330000 50%, #1a0000 100%);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 5px;
            cursor: pointer;
            box-shadow: 0 0 18px #cc000066, 0 0 40px #cc000033, inset 0 0 20px #cc000022;
            animation: btn-pulse 2.5s ease-in-out infinite;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        @keyframes btn-pulse {
            0%, 100% { box-shadow: 0 0 18px #cc000066, 0 0 40px #cc000033, inset 0 0 20px #cc000022; }
            50%       { box-shadow: 0 0 28px #cc0000aa, 0 0 60px #cc000055, inset 0 0 30px #cc000044; }
        }

        .dl-main-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 32px #cc0000cc, 0 0 70px #cc000066, inset 0 0 30px #cc000044;
        }

        .dl-main-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            animation: none;
        }

        /* ===== DESKTOP (768px+) ===== */
        @media (min-width: 768px) {
            .page-wrapper { padding: 40px 32px 60px; }
            .logo { font-size: 4rem; }
            .main-panel { max-width: 800px; }
            .dl-main-btn { width: 320px; height: 80px; font-size: 1.1rem; }
        }

        /* ===== MOBILE (<= 600px) ===== */
        @media (max-width: 600px) {
            .main-panel { padding: 0 24px; }
            .dl-main-btn { width: 100%; }
            .quality-select { flex-wrap: wrap; justify-content: center; }
        }

        /* ===== NARROW SCREENS (<400px) ===== */
        @media (max-width: 400px) {
            .dl-main-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <video class="bg-video" autoplay muted loop playsinline>
        <source src="/static/makima.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="page-wrapper">
        <div class="header">
            <div class="logo">MIITOK</div>
            <div class="tagline">TIKTOK DOWNLOADER — NO WATERMARK</div>
            <div class="divider"></div>
        </div>

        <div class="main-panel">
            <div class="quality-select">
                <button class="quality-btn active" onclick="setQuality(this,'best')">BEST</button>
                <button class="quality-btn" onclick="setQuality(this,'1080')">1080P</button>
                <button class="quality-btn" onclick="setQuality(this,'720')">720P</button>
                <button class="quality-btn" onclick="setQuality(this,'audio')">&#9834; AUDIO</button>
            </div>

            <div class="input-row">
                <input class="input-box" id="urlInput"
                       placeholder="Paste link TikTok di sini..."
                       type="text"/>
            </div>

            <div class="dl-btn-wrapper">
                <button class="dl-main-btn" id="dlBtn" onclick="startDownload()">DOWNLOAD</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div class="loading-text">MEMPROSES...</div>
            </div>

            <div class="photo-grid" id="photoGrid"></div>
            <button class="dl-all-btn" id="dlAllBtn" onclick="downloadAll()">&#11015; DOWNLOAD SEMUA FOTO</button>

            <div class="status" id="status"></div>
        </div>

        <div class="footer">MIITOK &copy; 2025 &mdash; FREE &amp; NO WATERMARK</div>
    </div>

    <script>
        let selectedQuality = 'best';
        let isDownloading = false;
        let photoUrls = [];

        function setQuality(el, q) {
            document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            selectedQuality = q;
        }

        function formatError(msg) {
            if (/ffmpeg/i.test(msg)) {
                return 'MP3 requires FFmpeg on server.';
            }
            if (msg.length > 60) {
                return msg.substring(0, 60) + '...';
            }
            return msg;
        }

        async function startDownload() {
            if (isDownloading) return;
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();
            const status = document.getElementById('status');
            const loading = document.getElementById('loading');
            const btn = document.getElementById('dlBtn');
            const photoGrid = document.getElementById('photoGrid');
            const dlAllBtn = document.getElementById('dlAllBtn');

            if (!url) {
                status.className = 'status error';
                status.textContent = '⚠ MASUKKAN LINK TIKTOK DULU';
                return;
            }

            isDownloading = true;
            btn.disabled = true;
            loading.classList.add('show');
            status.className = 'status';
            status.textContent = '';
            photoGrid.classList.remove('show');
            photoGrid.innerHTML = '';
            dlAllBtn.classList.remove('show');

            try {
                const fd = new FormData();
                fd.append('url', urlInput.value.trim());
                fd.append('quality', selectedQuality);
                const response = await fetch('/download', {
                    method: 'POST',
                    body: fd
                });

                const contentType = response.headers.get('content-type');

                if (contentType && contentType.includes('application/json')) {
                    const data = await response.json();

                    if (data.type === 'photos') {
                        photoUrls = data.urls;
                        photoGrid.classList.add('show');
                        dlAllBtn.classList.add('show');
                        data.urls.forEach((imgUrl, i) => {
                            const item = document.createElement('div');
                            item.className = 'photo-item';

                            const img = document.createElement('img');
                            img.setAttribute('src', imgUrl);
                            img.setAttribute('alt', 'Photo ' + (i + 1));
                            item.appendChild(img);

                            const dlBtnEl = document.createElement('button');
                            dlBtnEl.className = 'photo-dl-btn';
                            dlBtnEl.textContent = '⬇ FOTO ' + (i + 1);
                            dlBtnEl.addEventListener('click', () => downloadPhoto(imgUrl, i + 1));
                            item.appendChild(dlBtnEl);

                            photoGrid.appendChild(item);
                        });
                        status.className = 'status success';
                        status.textContent = '✓ ' + data.urls.length + ' FOTO DITEMUKAN';
                    } else {
                        status.className = 'status error';
                        status.textContent = '✗ ' + (data.error || 'Unknown error');
                    }
                } else if (response.ok) {
                    const blob = await response.blob();
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = selectedQuality === 'audio' ? 'miitok_audio.mp3' : 'miitok_video.mp4';
                    a.click();
                    status.className = 'status success';
                    status.textContent = '✓ DOWNLOAD BERHASIL!';
                }
            } catch(e) {
                status.className = 'status error';
                status.textContent = '✗ ERROR: ' + formatError(e.message);
            } finally {
                btn.disabled = false;
                isDownloading = false;
                loading.classList.remove('show');
            }
        }

        function downloadPhoto(url, num) {
            const a = document.createElement('a');
            a.href = url;
            a.download = 'miitok_photo_' + num + '.jpg';
            a.target = '_blank';
            a.click();
        }

        function downloadAll() {
            photoUrls.forEach((url, i) => {
                setTimeout(() => downloadPhoto(url, i + 1), i * 500);
            });
        }

    </script>
</body>
</html>
